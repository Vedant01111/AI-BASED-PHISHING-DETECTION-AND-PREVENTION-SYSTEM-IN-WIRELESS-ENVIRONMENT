{% if is_paginated %}
  <div class="mt-6 flex items-center justify-between text-sm">
    <p class="text-slate-500">Page {{ page_obj.number }} of {{ paginator.num_pages }}</p>
    <div class="flex gap-2">
      {% if page_obj.has_previous %}
        <a href="?page={{ page_obj.previous_page_number }}" class="rounded-md border border-slate-200 bg-white px-3 py-1 hover:bg-slate-50">Previous</a>
      {% endif %}
      {% if page_obj.has_next %}
        <a href="?page={{ page_obj.next_page_number }}" class="rounded-md border border-slate-200 bg-white px-3 py-1 hover:bg-slate-50">Next</a>
      {% endif %}
    </div>
  </div>
{% endif %}
